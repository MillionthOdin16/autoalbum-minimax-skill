name: Unpack AutoAlbum Skill

on:
  push:
    paths:
      - autoalbum-minimax-v24-production-test-ready.zip.b64
      - .github/workflows/unpack-skill.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decode and unpack skill archive
        run: |
          set -euo pipefail
          test -f autoalbum-minimax-v24-production-test-ready.zip.b64
          base64 -d autoalbum-minimax-v24-production-test-ready.zip.b64 > /tmp/autoalbum-skill.zip
          rm -rf /tmp/autoalbum-skill
          mkdir -p /tmp/autoalbum-skill
          unzip -q /tmp/autoalbum-skill.zip -d /tmp/autoalbum-skill
          src="/tmp/autoalbum-skill/autoalbum-minimax-v24-production-test-ready"
          test -d "$src"
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='autoalbum-minimax-v24-production-test-ready.zip.b64' \
            "$src"/ ./
      - name: Commit unpacked skill contents
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Unpack AutoAlbum MiniMax v24 skill contents"
            git push
          fi
